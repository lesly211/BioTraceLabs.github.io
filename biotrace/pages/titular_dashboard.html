<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Titular - BioTrace</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .dashboard-container {
      max-width: 100%;
      margin: 0;
      padding: 12px;
    }
    
    @media (min-width: 768px) {
      .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
    }
    
    .welcome-banner {
      background: linear-gradient(135deg, #0d3b2e 0%, #1a5c47 100%);
      color: white;
      padding: 20px 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .welcome-banner h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      font-weight: 700;
    }
    
    .welcome-banner p {
      margin: 0;
      font-size: 13px;
    }
    
    @media (min-width: 768px) {
      .welcome-banner {
        padding: 30px;
        border-radius: 16px;
        margin-bottom: 30px;
      }
      
      .welcome-banner h1 {
        font-size: 32px;
        margin-bottom: 10px;
      }
      
      .welcome-banner p {
        font-size: 16px;
      }
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .stat-card {
      background: white;
      padding: 15px 10px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #0d3b2e;
      margin: 8px 0;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    @media (min-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      
      .stat-card {
        padding: 24px;
        border-radius: 12px;
      }
      
      .stat-number {
        font-size: 36px;
        margin: 10px 0;
      }
      
      .stat-label {
        font-size: 14px;
      }
    }
    
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .action-btn {
      background: linear-gradient(135deg, #0d3b2e 0%, #1a5c47 100%);
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      transition: transform 0.2s;
      font-weight: 600;
      font-size: 14px;
      display: block;
    }
    
    .action-btn:active {
      transform: scale(0.98);
    }
    
    @media (min-width: 768px) {
      .action-buttons {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
      }
      
      .action-btn {
        padding: 20px;
        border-radius: 12px;
        font-size: 16px;
      }
      
      .action-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(13, 59, 46, 0.3);
      }
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #0d3b2e;
      margin: 20px 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .table-container {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    @media (min-width: 768px) {
      .section-title {
        font-size: 24px;
        margin: 30px 0 20px 0;
        gap: 10px;
      }
      
      .table-container {
        border-radius: 12px;
        padding: 20px;
      }
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th {
      background: #f3f4f6;
      padding: 10px 8px;
      text-align: left;
      font-weight: 600;
      color: #374151;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    
    .data-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      white-space: nowrap;
    }
    
    @media (min-width: 768px) {
      .data-table th {
        padding: 12px;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      
      .data-table td {
        padding: 12px;
        font-size: 14px;
      }
    }
    
    .data-table tr:hover {
      background: #f9fafb;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge-success {
      background: #d4edda;
      color: #155724;
    }
    
    .badge-warning {
      background: #fff3cd;
      color: #856404;
    }
    
    .badge-info {
      background: #d1ecf1;
      color: #0c5460;
    }
    
    .badge-secondary {
      background: #e2e8f0;
      color: #475569;
    }
    
    .btn-link {
      color: #0d3b2e;
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="mint-bg">
  <div class="dashboard-container">
    <div class="welcome-banner">
      <h1>🌳 Dashboard del Titular</h1>
      <p id="userName">Bienvenido al Sistema BioTrace</p>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Trozos</div>
        <div class="stat-number" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En Tránsito</div>
        <div class="stat-number" id="stat-transito">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recibidos</div>
        <div class="stat-number" id="stat-recibidos">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendientes</div>
        <div class="stat-number" id="stat-pendientes">0</div>
      </div>
    </div>
    
    <div class="action-buttons">
      <a href="titular_form.html" class="action-btn">➕ Registrar Nuevo Trozo</a>
      <a href="/chatbot" class="action-btn">🤖 Chatbot IA OSINFOR</a>
    </div>
    
    <h2 class="section-title">📋 Historial de Trozos Registrados</h2>
    
    <div class="table-container">
      <table class="data-table" id="tablaTrozos">
        <thead>
          <tr>
            <th>Código</th>
            <th>Especie</th>
            <th>Parcela</th>
            <th>DAP (cm)</th>
            <th>Volumen (m³)</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="trozosBody">
          <tr>
            <td colspan="8" class="empty-state">
              <div class="empty-state-icon">📦</div>
              <div>Cargando trozos...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <a href="../index.html" class="back-link" style="margin-top: 30px; display: inline-block;">← Salir</a>
  </div>
  
  <script>
    // Verificar autenticación
    if (sessionStorage.getItem('btl_role') !== 'titular') {
      location.href = '../pages/login.html?role=titular';
    }
    
    const usuario_id = sessionStorage.getItem('btl_user_id');
    const userName = sessionStorage.getItem('btl_user_name');
    
    if (userName) {
      document.getElementById('userName').textContent = `Bienvenido, ${userName}`;
    }
    
    // Cargar estadísticas
    async function cargarEstadisticas() {
      try {
        const response = await fetch(`http://localhost:5000/api/traz/stats/${usuario_id}?rol=titular`);
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('stat-total').textContent = result.stats.total_trozos || 0;
          document.getElementById('stat-transito').textContent = result.stats.en_transito || 0;
          document.getElementById('stat-recibidos').textContent = result.stats.recibidos || 0;
          document.getElementById('stat-pendientes').textContent = result.stats.pendientes || 0;
        }
      } catch (error) {
        console.error('Error al cargar estadísticas:', error);
      }
    }
    
    // Cargar historial de trozos
    async function cargarTrozos() {
      try {
        const response = await fetch(`http://localhost:5000/api/traz/trozos/${usuario_id}`);
        const result = await response.json();
        
        const tbody = document.getElementById('trozosBody');
        
        if (result.success && result.trozos && result.trozos.length > 0) {
          tbody.innerHTML = result.trozos.map(trozo => {
            const estadoBadge = getEstadoBadge(trozo.estado);
            const fecha = new Date(trozo.fecha_hora).toLocaleDateString('es-PE');
            
            return `
              <tr>
                <td><strong>${trozo.codigo_unico_trozo}</strong></td>
                <td>${trozo.especie}</td>
                <td>${trozo.numero_parcela}</td>
                <td>${trozo.dap_cm}</td>
                <td>${trozo.volumen_m3}</td>
                <td>${estadoBadge}</td>
                <td>${fecha}</td>
                <td>
                  <button class="btn-link" onclick="verDetalle('${trozo.codigo_unico_trozo}')">Ver detalle</button>
                  ${trozo.estado === 'EN_TRANSITO' ? 
                    `<br><button class="btn-link" onclick="verRuta('${trozo.codigo_unico_trozo}')">🚛 Ver ruta</button>` : 
                    ''
                  }
                </td>
              </tr>
            `;
          }).join('');
        } else {
          tbody.innerHTML = `
            <tr>
              <td colspan="8" class="empty-state">
                <div class="empty-state-icon">📦</div>
                <div>No hay trozos registrados todavía.</div>
                <br>
                <a href="titular_form.html" class="btn-link">Registrar primer trozo</a>
              </td>
            </tr>
          `;
        }
      } catch (error) {
        console.error('Error al cargar trozos:', error);
        document.getElementById('trozosBody').innerHTML = `
          <tr>
            <td colspan="8" class="empty-state">
              <div style="color: #dc3545;">Error al cargar los trozos</div>
            </td>
          </tr>
        `;
      }
    }
    
    function getEstadoBadge(estado) {
      const badges = {
        'REGISTRADO': '<span class="badge badge-secondary">Registrado</span>',
        'EN_TRANSITO': '<span class="badge badge-info">En Tránsito</span>',
        'RECIBIDO': '<span class="badge badge-success">Recibido</span>',
        'VERIFICADO': '<span class="badge badge-success">Verificado</span>'
      };
      return badges[estado] || `<span class="badge badge-secondary">${estado}</span>`;
    }
    
    function verDetalle(codigo) {
      alert(`Ver detalle completo del trozo: ${codigo}`);
      // Implementar modal o página de detalle
    }
    
    function verRuta(codigo) {
      // Redirigir a página de tracking de ruta
      location.href = `tracking_ruta.html?codigo=${codigo}`;
    }
    
    // Cargar datos al iniciar
    cargarEstadisticas();
    cargarTrozos();
    
    // Actualizar cada 30 segundos
    setInterval(() => {
      cargarEstadisticas();
      cargarTrozos();
    }, 30000);
  </script>
</body>
</html>
